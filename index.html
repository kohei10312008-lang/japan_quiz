<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>にほんちり クイズ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
  :root {
    --red:#E63946; --navy:#1D3557; --sky:#A8DADC; --gold:#FFB703;
    --white:#FFFFFF; --gray:#6B7280; --light:#E8F4F8;
    --correct:#2D9B4E; --wrong:#DC2626; --radius:16px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Noto Sans JP',sans-serif;
    background:linear-gradient(160deg,#1D3557 0%,#457B9D 60%,#A8DADC 100%);
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:16px;
  }
  .screen { display:none; width:100%; max-width:560px; }
  .screen.active { display:block; }
  .card { background:var(--white); border-radius:var(--radius); padding:24px 20px; box-shadow:0 8px 32px rgba(0,0,0,0.18); }

  /* HEADER */
  .app-header { text-align:center; margin-bottom:16px; }
  .app-header .flag { font-size:48px; display:block; margin-bottom:2px; }
  .app-title { font-size:24px; font-weight:900; color:var(--navy); letter-spacing:0.06em; }
  .app-sub { font-size:12px; color:var(--gray); margin-top:3px; }

  /* MODE TABS */
  .mode-tabs { display:flex; gap:8px; margin-bottom:16px; }
  .mode-tab {
    flex:1; padding:12px 6px; border:2.5px solid var(--light); border-radius:12px;
    background:var(--light); font-family:inherit; font-size:13px; font-weight:700;
    color:var(--navy); cursor:pointer; text-align:center; transition:all .15s;
  }
  .mode-tab .tab-icon { font-size:22px; display:block; margin-bottom:3px; }
  .mode-tab.selected { border-color:var(--red); background:#fff0f0; color:var(--red); }

  /* FURIGANA */
  .furigana-row { display:flex; align-items:center; justify-content:flex-end; gap:8px; margin-bottom:12px; }
  .furigana-label { font-size:12px; font-weight:700; color:var(--gray); }
  .toggle-switch { position:relative; width:44px; height:24px; cursor:pointer; }
  .toggle-switch input { display:none; }
  .toggle-track { position:absolute; inset:0; background:#ccc; border-radius:99px; transition:background .2s; }
  .toggle-switch input:checked + .toggle-track { background:var(--navy); }
  .toggle-thumb { position:absolute; top:3px; left:3px; width:18px; height:18px; background:#fff; border-radius:50%; transition:left .2s; box-shadow:0 1px 3px rgba(0,0,0,.2); }
  .toggle-switch input:checked ~ .toggle-thumb { left:23px; }

  /* CATEGORY */
  .section-label { font-size:13px; font-weight:700; color:var(--gray); margin-bottom:8px; }
  .category-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
  .cat-btn {
    background:var(--light); border:2.5px solid transparent; border-radius:12px;
    padding:12px 8px; cursor:pointer; transition:all .15s; text-align:center; outline:none;
  }
  .cat-btn:hover { border-color:var(--navy); background:#ddeffa; }
  .cat-btn.selected { border-color:var(--red); background:#fff0f0; }
  .cat-btn .cat-icon { font-size:24px; display:block; margin-bottom:2px; }
  .cat-btn .cat-name { font-size:13px; font-weight:700; color:var(--navy); display:block; }
  .cat-btn .cat-count { font-size:11px; color:var(--gray); }

  /* COUNT */
  .count-row { display:flex; gap:8px; margin-bottom:14px; }
  .count-btn {
    flex:1; padding:9px 4px; border:2px solid var(--light); border-radius:10px;
    background:var(--light); font-family:inherit; font-size:12px; font-weight:700;
    color:var(--navy); cursor:pointer; transition:all .15s; text-align:center;
  }
  .count-btn.selected { border-color:var(--navy); background:var(--navy); color:#fff; }

  .start-btn {
    display:block; width:100%; padding:15px; background:var(--red); color:var(--white);
    font-family:inherit; font-size:17px; font-weight:900; border:none; border-radius:12px;
    cursor:pointer; letter-spacing:.08em; transition:background .15s,transform .1s;
    box-shadow:0 4px 12px rgba(230,57,70,.35);
  }
  .start-btn:hover { background:#c0192a; transform:translateY(-1px); }
  .start-btn:disabled { background:#ccc; box-shadow:none; transform:none; cursor:not-allowed; }

  /* QUIZ META */
  .quiz-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .progress-wrap { flex:1; background:var(--light); border-radius:99px; height:8px; margin:0 10px; overflow:hidden; }
  .progress-bar { height:100%; background:var(--red); border-radius:99px; transition:width .4s; }
  .meta-label { font-size:12px; font-weight:700; color:var(--gray); white-space:nowrap; }
  .score-badge { background:var(--gold); color:var(--navy); font-size:13px; font-weight:900; padding:4px 10px; border-radius:99px; }

  /* TIMER */
  .timer-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .timer-track { flex:1; background:#eee; border-radius:99px; height:7px; overflow:hidden; }
  .timer-fill { height:100%; border-radius:99px; background:var(--gold); transition:width .1s linear,background .5s; }
  .timer-fill.hurry { background:var(--red); }
  .timer-num { font-size:13px; font-weight:900; color:var(--navy); min-width:28px; text-align:right; }

  /* TOP BAR */
  .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .q-category-tag { display:inline-block; background:var(--navy); color:var(--white); font-size:11px; font-weight:700; padding:3px 10px; border-radius:99px; }
  .streak-badge { background:#fff3cd; color:#b45309; font-size:12px; font-weight:900; padding:3px 10px; border-radius:99px; display:none; align-items:center; gap:4px; }
  .streak-badge.show { display:flex; }
  .diff-badge { font-size:11px; font-weight:700; padding:3px 8px; border-radius:99px; }
  .diff-easy { background:#e6f9ee; color:#2D9B4E; }
  .diff-mid  { background:#fff3cd; color:#b45309; }
  .diff-hard { background:#fdecea; color:#DC2626; }

  /* QUESTION (4択モード) */
  .question-text { font-size:18px; font-weight:700; color:var(--navy); line-height:1.6; min-height:56px; margin-bottom:6px; }
  ruby { ruby-align:center; }
  rt { font-size:.55em; color:var(--navy); opacity:.7; }
  body.no-furigana rt { display:none; }
  .question-hint { font-size:12px; color:var(--gray); margin-bottom:14px; }

  .choices { display:flex; flex-direction:column; gap:8px; }
  .choice-btn {
    background:var(--light); border:2.5px solid transparent; border-radius:12px;
    padding:12px 14px; font-family:inherit; font-size:14px; font-weight:700;
    color:var(--navy); cursor:pointer; text-align:left; transition:all .12s;
    outline:none; display:flex; align-items:center; gap:10px;
  }
  .choice-letter {
    width:26px; height:26px; background:var(--white); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:900; flex-shrink:0; border:2px solid #cdd;
  }
  .choice-btn:not(:disabled):hover { border-color:var(--navy); background:#ddeffa; }
  .choice-btn.correct { background:#e6f9ee; border-color:var(--correct); color:var(--correct); }
  .choice-btn.correct .choice-letter { background:var(--correct); color:#fff; border-color:var(--correct); }
  .choice-btn.wrong   { background:#fdecea; border-color:var(--wrong);   color:var(--wrong);   }
  .choice-btn.wrong   .choice-letter { background:var(--wrong);   color:#fff; border-color:var(--wrong); }

  /* MAP MODE */
  .map-question { font-size:17px; font-weight:700; color:var(--navy); text-align:center; margin-bottom:10px; line-height:1.5; }
  .map-wrap {
    width:100%; background:#EEF6FF; border-radius:12px; overflow:hidden;
    border:2px solid var(--light); position:relative; margin-bottom:10px;
    touch-action:none;
  }
  .map-wrap svg { display:block; width:100%; height:auto; }

  /* 都道府県パス */
  .pref-path {
    fill:#B8D4E8; stroke:#fff; stroke-width:0.8;
    cursor:pointer; transition:fill .15s;
  }
  .pref-path:hover { fill:#7FB3D3; }
  .pref-path.target  { fill:#FFD166; stroke:#E63946; stroke-width:1.5; }
  .pref-path.correct-pref { fill:#2D9B4E; stroke:#fff; stroke-width:0.8; animation:flash-correct .4s ease; }
  .pref-path.wrong-pref   { fill:#DC2626; stroke:#fff; stroke-width:0.8; animation:flash-wrong .4s ease; }
  .pref-path.show-correct { fill:#2D9B4E; stroke:#fff; stroke-width:0.8; }
  @keyframes flash-correct { 0%{fill:#fff} 100%{fill:#2D9B4E} }
  @keyframes flash-wrong   { 0%{fill:#fff} 100%{fill:#DC2626} }

  .map-hint { font-size:11px; color:var(--gray); text-align:center; margin-bottom:6px; }
  .map-hint-btn {
    display:inline-block; margin:0 auto 8px; padding:5px 14px;
    border:1.5px solid var(--navy); background:transparent; border-radius:99px;
    font-family:inherit; font-size:12px; font-weight:700; color:var(--navy);
    cursor:pointer; transition:all .15s;
  }
  .map-hint-btn:hover { background:var(--navy); color:#fff; }
  .map-hint-area { text-align:center; margin-bottom:6px; min-height:18px; }

  /* FEEDBACK */
  .feedback-bar {
    margin-top:10px; padding:11px 14px; border-radius:10px;
    font-size:14px; font-weight:700; display:none; align-items:center; gap:8px;
    animation:pop .2s ease;
  }
  .feedback-bar.show { display:flex; }
  .feedback-bar.ok { background:#e6f9ee; color:var(--correct); }
  .feedback-bar.ng { background:#fdecea; color:var(--wrong); }
  @keyframes pop { from{transform:scale(.95);opacity:.4} to{transform:scale(1);opacity:1} }

  .next-btn {
    display:none; width:100%; margin-top:10px; padding:13px;
    background:var(--navy); color:var(--white); font-family:inherit;
    font-size:15px; font-weight:700; border:none; border-radius:12px;
    cursor:pointer; letter-spacing:.05em; transition:background .15s;
  }
  .next-btn:hover { background:#152840; }
  .next-btn.show { display:block; }

  /* RESULT */
  .result-hero { text-align:center; padding:10px 0 6px; }
  .result-emoji { font-size:56px; display:block; }
  .result-score-big { font-size:44px; font-weight:900; color:var(--navy); line-height:1; margin:6px 0 3px; }
  .result-label { font-size:13px; color:var(--gray); }
  .result-message { text-align:center; font-size:16px; font-weight:700; color:var(--navy); margin:10px 0 14px; }
  .result-breakdown { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
  .stat-box { background:var(--light); border-radius:10px; padding:10px; text-align:center; }
  .stat-val { font-size:20px; font-weight:900; color:var(--navy); }
  .stat-key { font-size:11px; color:var(--gray); }
  .review-list { margin-bottom:14px; max-height:220px; overflow-y:auto; }
  .review-item { border-left:4px solid transparent; padding:7px 9px; margin-bottom:5px; border-radius:0 8px 8px 0; font-size:12px; line-height:1.5; }
  .review-item.ok { border-color:var(--correct); background:#e6f9ee; }
  .review-item.ng { border-color:var(--wrong);   background:#fdecea; }
  .rv-q { font-weight:700; color:var(--navy); }
  .rv-a { color:var(--gray); margin-top:1px; }
  .retry-btn {
    display:block; width:100%; padding:14px; background:var(--red); color:var(--white);
    font-family:inherit; font-size:16px; font-weight:900; border:none; border-radius:12px;
    cursor:pointer; margin-bottom:8px; box-shadow:0 4px 12px rgba(230,57,70,.3);
  }
  .back-btn {
    display:block; width:100%; padding:12px; background:var(--light);
    color:var(--navy); font-family:inherit; font-size:14px; font-weight:700;
    border:none; border-radius:12px; cursor:pointer;
  }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .bouncing { animation:bounce .5s ease 3; }

  /* ===== BADGE ===== */
  .badge-row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; min-height:36px; }
  .badge-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:4px; }
  .badge-item {
    display:flex; flex-direction:column; align-items:center; text-align:center;
    background:var(--light); border-radius:10px; padding:8px 4px; position:relative;
  }
  .badge-item.locked { opacity:0.35; filter:grayscale(1); }
  .badge-item.new-glow { animation:glow .8s ease 3; }
  @keyframes glow { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 12px 4px #FFB703;} }
  .badge-icon { font-size:26px; line-height:1; }
  .badge-name { font-size:9px; font-weight:700; color:var(--navy); margin-top:3px; line-height:1.2; }
  .badge-new { position:absolute; top:-4px; right:-4px; background:var(--red); color:#fff;
    font-size:9px; font-weight:900; padding:1px 5px; border-radius:99px; }

  /* ===== RANKING ===== */
  .rank-cat-btn {
    padding:5px 12px; border:2px solid var(--light); border-radius:99px;
    background:var(--light); font-family:inherit; font-size:12px; font-weight:700;
    color:var(--navy); cursor:pointer;
  }
  .rank-cat-btn.active { border-color:var(--navy); background:var(--navy); color:#fff; }
  .rank-table { width:100%; border-collapse:collapse; }
  .rank-table th { font-size:11px; color:var(--gray); padding:4px 6px; text-align:left; border-bottom:2px solid var(--light); }
  .rank-table td { font-size:13px; padding:8px 6px; border-bottom:1px solid var(--light); font-weight:700; color:var(--navy); }
  .rank-table tr:first-child td { color:#B45309; }
  .rank-table tr:nth-child(2) td { color:#6B7280; }
  .rank-table tr:nth-child(3) td { color:#92400E; }
  .rank-medal { font-size:16px; }
  .rank-empty { text-align:center; color:var(--gray); font-size:13px; padding:20px 0; }

  /* ===== SPLASH ===== */
  #splash {
    position:fixed; inset:0; z-index:9999;
    background:linear-gradient(160deg,#1D3557 0%,#457B9D 55%,#A8DADC 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
  }
  #splash.hide { animation:splashOut .55s ease forwards; pointer-events:none; }
  @keyframes splashOut { to { opacity:0; transform:scale(1.03); } }
  .splash-logo {
    font-size:80px; animation:splashBounce .7s cubic-bezier(.36,.07,.19,.97) both;
    filter:drop-shadow(0 4px 16px rgba(0,0,0,.3));
  }
  @keyframes splashBounce {
    0%  { transform:scale(0) rotate(-15deg); opacity:0; }
    60% { transform:scale(1.2) rotate(6deg); opacity:1; }
    80% { transform:scale(.95) rotate(-3deg); }
    100%{ transform:scale(1) rotate(0); }
  }
  .splash-title { font-size:28px; font-weight:900; color:#fff; letter-spacing:.1em;
    text-shadow:0 2px 8px rgba(0,0,0,.25); animation:fadeUp .5s .3s both; }
  .splash-sub { font-size:14px; color:rgba(255,255,255,.82); font-weight:700;
    animation:fadeUp .5s .5s both; }
  .splash-dots { display:flex; gap:8px; margin-top:8px; animation:fadeUp .4s .7s both; }
  .splash-dot { width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,.5);
    animation:dotPulse 1.2s .9s infinite ease-in-out; }
  .splash-dot:nth-child(2){ animation-delay:1.05s; }
  .splash-dot:nth-child(3){ animation-delay:1.2s; }
  @keyframes dotPulse { 0%,100%{opacity:.4;transform:scale(.8)} 50%{opacity:1;transform:scale(1.2)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }

  /* ===== FLASH OVERLAY ===== */
  #correct-overlay {
    position:fixed; inset:0; z-index:8000; pointer-events:none;
    display:flex; align-items:center; justify-content:center; opacity:0;
  }
  #correct-overlay.flash-ok { animation:flashOk .55s ease forwards; }
  #correct-overlay.flash-ng { animation:flashNg .45s ease forwards; }
  @keyframes flashOk {
    0%{opacity:0;background:rgba(45,155,78,0)} 30%{opacity:1;background:rgba(45,155,78,.15)} 100%{opacity:0;background:rgba(45,155,78,0)}
  }
  @keyframes flashNg {
    0%{opacity:0;background:rgba(220,38,38,0)} 30%{opacity:1;background:rgba(220,38,38,.12)} 100%{opacity:0;background:rgba(220,38,38,0)}
  }
  .overlay-stamp { font-size:90px; transform:scale(0); opacity:0; }
  .flash-ok .overlay-stamp { animation:stampIn .45s cubic-bezier(.36,.07,.19,.97) .05s forwards; }
  .flash-ng .overlay-stamp { animation:stampShake .4s ease .05s forwards; }
  @keyframes stampIn {
    0%{transform:scale(0) rotate(-20deg);opacity:0} 60%{transform:scale(1.25) rotate(6deg);opacity:1} 100%{transform:scale(1) rotate(0);opacity:1}
  }
  @keyframes stampShake {
    0%{transform:scale(0);opacity:0} 40%{transform:scale(1.1) translateX(-6px);opacity:1}
    60%{transform:translateX(6px)} 80%{transform:translateX(-4px)} 100%{transform:none;opacity:1}
  }

  /* ===== PARTICLES ===== */
  #particle-canvas { position:fixed; inset:0; z-index:7999; pointer-events:none; }

  /* ===== CARD SHAKE ===== */
  @keyframes cardShake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)}
    40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)}
  }
  .shake { animation:cardShake .35s ease; }

  /* ===== CORRECT PULSE ===== */
  @keyframes choicePulse {
    0%{box-shadow:0 0 0 0 rgba(45,155,78,.5)} 60%{box-shadow:0 0 0 12px rgba(45,155,78,0)} 100%{box-shadow:none}
  }
  .choice-btn.correct { animation:choicePulse .55s ease .08s; }

  /* ===== SCREEN IN ===== */
  .screen.active { animation:screenIn .28s ease; }
  @keyframes screenIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

  /* ===== 途中もどるボタン ===== */
  .quit-btn {
    position:absolute; top:0; right:0;
    background:none; border:none; font-size:20px; cursor:pointer;
    color:var(--gray); padding:4px 6px; line-height:1;
    transition:color .15s;
  }
  .quit-btn:hover { color:var(--red); }
  .quiz-card-wrap { position:relative; }

  /* ===== 復習モードバナー ===== */
  .review-mode-banner {
    background:linear-gradient(90deg,#FF6B35,#E63946);
    color:#fff; font-size:12px; font-weight:900;
    padding:6px 14px; border-radius:99px;
    text-align:center; margin-bottom:10px;
    letter-spacing:.05em;
  }

  /* ===== 進捗画面 ===== */
  .progress-screen-header {
    display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;
  }
  .stat-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px;
  }
  .stat-card {
    background:var(--light); border-radius:12px; padding:12px 10px; text-align:center;
  }
  .stat-card .sc-val { font-size:24px; font-weight:900; color:var(--navy); }
  .stat-card .sc-key { font-size:11px; color:var(--gray); margin-top:2px; }
  .cat-progress-list { margin-bottom:16px; }
  .cat-progress-item { margin-bottom:12px; }
  .cat-progress-label {
    display:flex; justify-content:space-between; align-items:center;
    font-size:13px; font-weight:700; color:var(--navy); margin-bottom:4px;
  }
  .cat-progress-rate { font-size:12px; color:var(--gray); }
  .cat-bar-bg {
    background:#e2e8f0; border-radius:99px; height:10px; overflow:hidden;
  }
  .cat-bar-fill {
    height:100%; border-radius:99px;
    transition:width .6s cubic-bezier(.4,0,.2,1);
  }
  .wrong-count-badge {
    display:inline-block; background:#fdecea; color:var(--wrong);
    font-size:11px; font-weight:700; padding:2px 8px; border-radius:99px; margin-left:6px;
  }
  .review-start-btn {
    display:block; width:100%; padding:13px; margin-top:6px;
    background:linear-gradient(90deg,#FF6B35,#E63946);
    color:#fff; font-family:inherit; font-size:15px; font-weight:900;
    border:none; border-radius:12px; cursor:pointer;
    box-shadow:0 4px 12px rgba(230,57,70,.3);
    transition:opacity .15s;
  }
  .review-start-btn:disabled { opacity:.45; cursor:not-allowed; }
</style>
</head>
<body>

<!-- ===== SPLASH ===== -->
<div id="splash">
  <div class="splash-logo">🗾</div>
  <div class="splash-title">にほんちり クイズ</div>
  <div class="splash-sub">小学生のための日本地理べんきょうアプリ</div>
  <div class="splash-dots">
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
  </div>
</div>

<!-- ===== FLASH OVERLAY ===== -->
<div id="correct-overlay"><div class="overlay-stamp" id="overlay-stamp"></div></div>

<!-- ===== PARTICLE CANVAS ===== -->
<canvas id="particle-canvas"></canvas>

<!-- ===== TITLE ===== -->
<div id="screen-title" class="screen active">
  <div class="card">
    <div class="app-header" style="position:relative;">
      <span class="flag">🗾</span>
      <div class="app-title">にほんちり クイズ</div>
      <div class="app-sub">小学生のための日本地理べんきょうアプリ</div>
      <button onclick="showScreen('screen-progress')" style="position:absolute;top:0;right:0;background:none;border:none;cursor:pointer;font-size:22px;" title="進捗をみる">📊</button>
    </div>

// =====================================================
// 状態
// =====================================================
let selectedCats = ['pref'];
let quizCount = 10;
let quizQuestions = [];
let currentIdx = 0;
let score = 0, streak = 0, maxStreak = 0;
let answered = false;
let timerInterval = null, timerLeft = 15;
let history = [];
let furiganaOn = true;
let isReviewMode = false;   // 復習モードフラグ
let wrongBank = [];         // 間違い問題ストック（localStorage永続）

// =====================================================
// 初期化
// =====================================================
function init() {
  renderCategories();
  renderRankCatTabs();
  renderAllBadges();
  loadWrongBank();
}

function selectCount(n, btn) {
  quizCount = n;
  document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function applyFurigana() {
  furiganaOn = document.getElementById('furigana-toggle').checked;
  document.body.classList.toggle('no-furigana', !furiganaOn);
}

// =====================================================
// カテゴリ
// =====================================================
function renderCategories() {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const count = QUESTIONS[cat.id].length;
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat.id==='pref' ? ' selected' : '');
    btn.dataset.id = cat.id;
    btn.innerHTML = `<span class="cat-icon">${cat.icon}</span><span class="cat-name">${cat.name}</span><span class="cat-count">${count}もん</span>`;
    btn.onclick = () => toggleCat(cat.id, btn);
    grid.appendChild(btn);
  });
}
function toggleCat(id, btn) {
  if (selectedCats.includes(id)) {
    selectedCats = selectedCats.filter(c => c!==id);
    btn.classList.remove('selected');
  } else {
    selectedCats.push(id);
    btn.classList.add('selected');
  }
  document.getElementById('start-btn').disabled = selectedCats.length===0;
}

// =====================================================
// クイズ開始
// =====================================================
function startQuiz() {
  isReviewMode = false;
  currentIdx=0; score=0; streak=0; maxStreak=0; history=[];
  let pool=[];
  selectedCats.forEach(id => QUESTIONS[id].forEach(q => pool.push({...q,cat:id})));
  pool=shuffle(pool);
  const n = quizCount===0 ? pool.length : Math.min(quizCount,pool.length);
  quizQuestions = pool.slice(0,n);
  document.getElementById('review-mode-banner').style.display='none';
  showScreen('screen-quiz');
  renderQuestion();
}

// =====================================================
// 4択クイズ
// =====================================================
const TIMER_FOUR = 15;
function renderQuestion() {
  answered=false;
  const q=quizQuestions[currentIdx], total=quizQuestions.length;
  document.getElementById('q-counter').textContent=`${currentIdx+1} / ${total}`;
  document.getElementById('progress-bar').style.width=`${(currentIdx/total)*100}%`;
  document.getElementById('score-live').textContent=`⭐ ${score}`;
  const cat=CATEGORIES.find(c=>c.id===q.cat);
  document.getElementById('q-tag').textContent=cat?`${cat.icon} ${cat.name}`:'';
  const diffEl=document.getElementById('diff-badge');
  if(q.diff===1){diffEl.className='diff-badge diff-easy';diffEl.textContent='★ やさしい';}
  else if(q.diff===2){diffEl.className='diff-badge diff-mid';diffEl.textContent='★★ ふつう';}
  else{diffEl.className='diff-badge diff-hard';diffEl.textContent='★★★ むずかしい';}
  const qText=document.getElementById('q-text');
  qText.innerHTML=q.q;
  applyFuriganaTo(qText);
  document.getElementById('q-hint').textContent=q.hint?`💡 ヒント：${q.hint}`:'';
  const letters=['Ａ','Ｂ','Ｃ','Ｄ'];
  const choicesEl=document.getElementById('choices');
  choicesEl.innerHTML='';
  const shuffled=shuffle([...q.choices]);
  shuffled.forEach((c,i)=>{
    const btn=document.createElement('button');
    btn.className='choice-btn';
    btn.innerHTML=`<span class="choice-letter">${letters[i]}</span>${c}`;
    btn.onclick=()=>selectAnswer(c,q.a);
    choicesEl.appendChild(btn);
  });
  document.getElementById('feedback-bar').className='feedback-bar';
  document.getElementById('next-btn').classList.remove('show');
  updateStreakBadge();
  startTimer();
}

function selectAnswer(chosen,correct) {
  if(answered)return; answered=true;
  clearInterval(timerInterval);
  const ok=chosen===correct;
  updateScore(ok);
  document.querySelectorAll('.choice-btn').forEach(btn=>{
    btn.disabled=true;
    const txt=btn.textContent.replace(/^[ＡＢＣＤ]/,'').trim();
    if(txt===correct)btn.classList.add('correct');
    else if(txt===chosen)btn.classList.add('wrong');
  });
  document.getElementById('score-live').textContent=`⭐ ${score}`;
  showFeedback(ok,ok?'🎉 せいかい！':`❌ こたえは「${correct}」でした`);
  document.getElementById('next-btn').classList.add('show');
  const q=quizQuestions[currentIdx];
  const tmp=document.createElement('div'); tmp.innerHTML=q.q;
  history.push({q:tmp.textContent,correct,chosen,ok,qObj:q});
  if(!ok) addToWrongBank(q);
  // 音・アニメーション
  if(ok){ playSound('correct'); showFlash(true); spawnParticles(); }
  else  { playSound('wrong');   showFlash(false); shakeCard(); }
}

function nextQuestion() { currentIdx++; if(currentIdx>=quizQuestions.length)showResult(); else renderQuestion(); }

// =====================================================
// タイマー
// =====================================================
function startTimer() {
  clearInterval(timerInterval);
  timerLeft = TIMER_FOUR;
  updateTimerUI();
  timerInterval=setInterval(()=>{
    timerLeft=Math.max(0,timerLeft-0.1);
    updateTimerUI();
    if(timerLeft<=0){ clearInterval(timerInterval); if(!answered)fourTimeUp(); }
  },100);
}
function updateTimerUI() {
  const fill=document.getElementById('timer-fill');
  fill.style.width=(timerLeft/TIMER_FOUR*100)+'%';
  fill.className='timer-fill'+(timerLeft<=4?' hurry':'');
  document.getElementById('timer-num').textContent=Math.ceil(timerLeft);
}
function fourTimeUp() {
  answered=true;
  const q=quizQuestions[currentIdx];
  streak=0; updateStreakBadge();
  document.querySelectorAll('.choice-btn').forEach(btn=>{
    btn.disabled=true;
    if(btn.textContent.includes(q.a))btn.classList.add('correct');
  });
  playSound('timeout'); showFlash(false); shakeCard(); showFeedback(false,`⏰ じかんぎれ！こたえは「${q.a}」でした`);
  document.getElementById('next-btn').classList.add('show');
  const tmp=document.createElement('div'); tmp.innerHTML=q.q;
  history.push({q:tmp.textContent,correct:q.a,chosen:null,ok:false,qObj:q});
  addToWrongBank(q);
}

// =====================================================
// 共通ヘルパー
// =====================================================
function updateScore(ok) {
  if(ok){score++;streak++;if(streak>maxStreak)maxStreak=streak;}
  else{streak=0;}
}
function updateStreakBadge() {
  const badge=document.getElementById('streak-badge');
  if(streak>=2){badge.classList.add('show');document.getElementById('streak-num').textContent=streak;}
  else badge.classList.remove('show');
}
function showFeedback(ok,msg) {
  const bar=document.getElementById('feedback-bar');
  bar.className='feedback-bar show '+(ok?'ok':'ng');
  document.getElementById('fb-text').textContent=msg;
}
function applyFuriganaTo(el) {
  if(!furiganaOn) el.querySelectorAll('rt').forEach(rt=>rt.style.display='none');
  else el.querySelectorAll('rt').forEach(rt=>rt.style.display='');
}

// =====================================================
// ランキング・実績ストレージ
// =====================================================
const STOR_KEY = 'jgeo_records_v2';
function loadRecords() {
  try { return JSON.parse(localStorage.getItem(STOR_KEY)) || {}; } catch{ return {}; }
}
function saveRecords(rec) {
  localStorage.setItem(STOR_KEY, JSON.stringify(rec));
}
function clearRecords() {
  localStorage.removeItem(STOR_KEY);
  renderRankList(rankCurrentCat);
  renderAllBadges();
  alert('きろくをリセットしました！');
}

// カテゴリ名ラベル
const CAT_LABELS = {
  pref:'都道府県', capital:'県庁所在地', region:'地方区分',
  mountain:'山', river:'川', island:'島・半島', mixed:'ミックス'
};

// =====================================================
// 結果を保存 & バッジ判定
// =====================================================
function saveResult(resultData) {
  const rec = loadRecords();
  // totalStats
  if(!rec.stats) rec.stats = {totalQ:0, perfectCount:0, hardCorrect:0, catDone:{}, capitalCorrect:0};
  rec.stats.totalQ += resultData.total;
  if(resultData.rate===100) rec.stats.perfectCount++;
  rec.stats.hardCorrect = (rec.stats.hardCorrect||0) + (resultData.hardCorrect||0);
  rec.stats.capitalCorrect = (rec.stats.capitalCorrect||0) + (resultData.capitalCorrect||0);
  selectedCats.forEach(id => { rec.stats.catDone[id] = true; });

  // ランキング（カテゴリ別）
  const catKey = selectedCats.length===1 ? selectedCats[0] : 'mixed';
  if(!rec.ranking) rec.ranking = {};
  if(!rec.ranking[catKey]) rec.ranking[catKey] = [];
  rec.ranking[catKey].push({
    score: resultData.score,
    total: resultData.total,
    rate:  resultData.rate,
    date:  new Date().toLocaleDateString('ja-JP',{month:'numeric',day:'numeric'}),
    streak:resultData.maxStreak,
  });
  rec.ranking[catKey].sort((a,b)=>b.rate-a.rate||b.score-a.score);
  if(rec.ranking[catKey].length>10) rec.ranking[catKey]=rec.ranking[catKey].slice(0,10);

  // バッジ判定
  const earned = rec.earnedBadges || [];
  const newBadges = [];
  BADGES.forEach(b=>{
    if(!earned.includes(b.id) && b.check(resultData, rec.stats)){
      earned.push(b.id);
      newBadges.push(b);
    }
  });
  rec.earnedBadges = earned;
  saveRecords(rec);
  return newBadges;
}

// =====================================================
// ランキング画面描画
// =====================================================
let rankCurrentCat = 'pref';
function renderRankCatTabs() {
  const tabs = document.getElementById('rank-cat-tabs');
  if(!tabs) return;
  tabs.innerHTML = '';
  ['pref','capital','region','mountain','river','island','mixed'].forEach(id=>{
    const btn = document.createElement('button');
    btn.className = 'rank-cat-btn' + (id===rankCurrentCat?' active':'');
    btn.textContent = CAT_LABELS[id];
    btn.onclick = ()=>{ rankCurrentCat=id; renderRankCatTabs(); renderRankList(id); };
    tabs.appendChild(btn);
  });
  renderRankList(rankCurrentCat);
}
function renderRankList(catKey) {
  const rec = loadRecords();
  const list = rec.ranking?.[catKey] || [];
  const el = document.getElementById('rank-list');
  if(!list.length){
    el.innerHTML='<div class="rank-empty">まだきろくがありません<br>クイズをプレイしてね！</div>';
    return;
  }
  const medals = ['🥇','🥈','🥉'];
  el.innerHTML = '<table class="rank-table"><thead><tr><th></th><th>せいかいりつ</th><th>スコア</th><th>れんぞく</th><th>日付</th></tr></thead><tbody>'
    + list.map((r,i)=>`<tr><td><span class="rank-medal">${medals[i]||`${i+1}`}</span></td><td>${r.rate}%</td><td>${r.score}/${r.total}</td><td>${r.streak}🔥</td><td>${r.date}</td></tr>`).join('')
    + '</tbody></table>';
}

// =====================================================
// バッジ画面描画
// =====================================================
function renderAllBadges() {
  const rec = loadRecords();
  const earned = rec.earnedBadges || [];
  const el = document.getElementById('all-badges');
  if(!el) return;
  el.innerHTML = BADGES.map(b=>{
    const got = earned.includes(b.id);
    return `<div class="badge-item${got?'':' locked'}" title="${b.desc}">
      <div class="badge-icon">${b.icon}</div>
      <div class="badge-name">${b.name}</div>
    </div>`;
  }).join('');
}

function renderNewBadges(newBadges) {
  const el = document.getElementById('new-badges');
  if(!newBadges.length){ el.innerHTML='<div style="font-size:12px;color:var(--gray)">（まだかくとくしていません）</div>'; return; }
  el.innerHTML = newBadges.map(b=>
    `<div class="badge-item new-glow">
      <div class="badge-new">NEW!</div>
      <div class="badge-icon">${b.icon}</div>
      <div class="badge-name">${b.name}</div>
    </div>`
  ).join('');
}

// =====================================================
// 結果
// =====================================================
function showResult() {
  clearInterval(timerInterval);
  const total=quizQuestions.length, rate=Math.round(score/total*100);
  // 難易度★★★正解数、county正解数を集計
  let hardCorrect=0, capitalCorrect=0;
  history.forEach((h,i)=>{
    const q=quizQuestions[i];
    if(h.ok){
      if(q&&q.diff===3) hardCorrect++;
      if(q&&q.cat==='capital') capitalCorrect++;
    }
  });
  document.getElementById('result-score').textContent=`${score} / ${total}`;
  document.getElementById('r-correct').textContent=score;
  document.getElementById('r-wrong').textContent=total-score;
  document.getElementById('r-streak').textContent=maxStreak;
  document.getElementById('r-rate').textContent=rate+'%';
  let emoji,msg;
  if(rate===100){emoji='🏆';msg='かんぺき！ぜんもんせいかい！';}
  else if(rate>=80){emoji='🎉';msg='すばらしい！よくできました！';}
  else if(rate>=60){emoji='😊';msg='よくがんばりました！もう少し！';}
  else if(rate>=40){emoji='🤔';msg='もういちどチャレンジしてみよう！';}
  else{emoji='💪';msg='まけないで！くりかえし練習しよう！';}
  const emojiEl=document.getElementById('result-emoji');
  emojiEl.textContent=emoji;
  if(rate===100)emojiEl.classList.add('bouncing');
  else emojiEl.classList.remove('bouncing');
  document.getElementById('result-msg').textContent=msg;
  // ふりかえり
  const list=document.getElementById('review-list');
  list.innerHTML='';
  history.forEach(h=>{
    const div=document.createElement('div');
    div.className='review-item '+(h.ok?'ok':'ng');
    div.innerHTML=`<div class="rv-q">${h.ok?'✅':'❌'} ${h.q}</div>
      <div class="rv-a">こたえ：${h.correct}${!h.ok&&h.chosen?`　あなた：${h.chosen}`:!h.ok?'　（じかんぎれ）':''}</div>`;
    list.appendChild(div);
  });
  // 実績保存・バッジ判定
  if(rate===100) playSound('perfect');
  const newBadges = saveResult({score,total,rate,maxStreak,hardCorrect,capitalCorrect});
  renderNewBadges(newBadges);
  renderRankCatTabs();
  // 復習ボタン：間違いがあれば有効
  const wrongCount = history.filter(h=>!h.ok).length;
  const rb = document.getElementById('review-btn');
  rb.disabled = wrongCount===0;
  rb.textContent = wrongCount>0 ? `📝 まちがい ${wrongCount}問 を復習する` : '📝 まちがいなし！';
  showScreen('screen-result');
}
function confirmQuit(){
  clearInterval(timerInterval);
  if(confirm('とちゅうでやめますか？\n（きろくはのこります）')){
    renderProgressScreen();
    goTitle();
  } else {
    // タイマー再開（未回答時のみ）
    if(!answered) startTimer();
  }
}
function retryQuiz(){ isReviewMode=false; startQuiz(); }
function goTitle(){ renderProgressScreen(); showScreen('screen-title'); }
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

init();

// =====================================================
// 間違いバンク（localStorage永続）
// =====================================================
const WRONG_KEY = 'jgeo_wrong_v1';

function loadWrongBank() {
  try { wrongBank = JSON.parse(localStorage.getItem(WRONG_KEY)) || []; }
  catch { wrongBank = []; }
}
function saveWrongBank() {
  localStorage.setItem(WRONG_KEY, JSON.stringify(wrongBank));
}
function addToWrongBank(q) {
  if (!q) return;
  // 同じ問題が既にあれば間違い回数を増やすだけ
  const key = q.q; // HTML文字列をキーに
  const existing = wrongBank.find(w => w.q === key);
  if (existing) {
    existing.wrongCount = (existing.wrongCount||1) + 1;
    existing.cat = q.cat;
  } else {
    wrongBank.push({ ...q, wrongCount:1 });
  }
  saveWrongBank();
}
function removeFromWrongBank(qKey) {
  wrongBank = wrongBank.filter(w => w.q !== qKey);
  saveWrongBank();
}

// =====================================================
// 復習モード開始（結果画面から）
// =====================================================
function startReview() {
  const wrongQs = history.filter(h => !h.ok).map(h => h.qObj).filter(Boolean);
  if (!wrongQs.length) return;
  launchReviewMode(wrongQs);
}

// 進捗画面の「復習する」ボタン
function startReviewFromProgress() {
  if (!wrongBank.length) return;
  launchReviewMode(shuffle([...wrongBank]));
}

function launchReviewMode(qs) {
  isReviewMode = true;
  currentIdx=0; score=0; streak=0; maxStreak=0; history=[];
  quizQuestions = shuffle([...qs]);
  document.getElementById('review-mode-banner').style.display='block';
  showScreen('screen-quiz');
  renderQuestion();
}

// =====================================================
// 進捗画面
// =====================================================
const CAT_COLORS = {
  pref:'#E63946', capital:'#457B9D', region:'#2D9B4E',
  mountain:'#8B4513', river:'#0077B6', island:'#9B2D9B'
};

function renderProgressScreen() {
  const rec = loadRecordsForProgress();
  const stats = rec.stats || {};
  const totalQ   = stats.totalQ || 0;
  const perfectC = stats.perfectCount || 0;
  const hardC    = stats.hardCorrect || 0;
  const badgeC   = (rec.earnedBadges||[]).length;

  // 統計グリッド
  document.getElementById('prog-stat-grid').innerHTML = `
    <div class="stat-card"><div class="sc-val">${totalQ}</div><div class="sc-key">📚 ごうけいもん数</div></div>
    <div class="stat-card"><div class="sc-val">${perfectC}</div><div class="sc-key">🏆 ぜんもんせいかい回数</div></div>
    <div class="stat-card"><div class="sc-val">${hardC}</div><div class="sc-key">🦁 ★★★せいかい累計</div></div>
    <div class="stat-card"><div class="sc-val">${badgeC}<span style="font-size:14px;color:var(--gray)">/${BADGES.length}</span></div><div class="sc-key">🎖 かくとくバッジ</div></div>
  `;

  // カテゴリ別正解率（ランキングデータから推定）
  const catList = document.getElementById('prog-cat-list');
  catList.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const entries = (rec.ranking || {})[cat.id] || [];
    const best = entries.length ? Math.max(...entries.map(e=>e.rate)) : null;
    const plays = entries.length;
    const color = CAT_COLORS[cat.id] || '#457B9D';
    const pct = best !== null ? best : 0;
    catList.innerHTML += `
      <div class="cat-progress-item">
        <div class="cat-progress-label">
          <span>${cat.icon} ${cat.name}</span>
          <span class="cat-progress-rate">${plays>0 ? `さいこう ${pct}% (${plays}回プレイ)` : 'まだプレイしていません'}</span>
        </div>
        <div class="cat-bar-bg">
          <div class="cat-bar-fill" style="width:${pct}%;background:${color}"></div>
        </div>
      </div>`;
  });

  // 間違いバンク表示
  loadWrongBank();
  const wrongSummary = document.getElementById('wrong-summary');
  const pb = document.getElementById('prog-review-btn');
  if (wrongBank.length) {
    const byCat = {};
    wrongBank.forEach(q => { byCat[q.cat] = (byCat[q.cat]||0)+1; });
    const detail = Object.entries(byCat).map(([id,n])=>{
      const cat = CATEGORIES.find(c=>c.id===id);
      return `${cat?cat.icon:''}${cat?cat.name:id}：${n}問`;
    }).join('　');
    wrongSummary.innerHTML = `<b style="color:var(--wrong)">${wrongBank.length}問</b>のまちがいがたまっています<br><span style="font-size:12px;color:var(--gray)">${detail}</span>`;
    pb.disabled = false;
    pb.textContent = `📝 まちがい ${wrongBank.length}問 を復習する`;
  } else {
    wrongSummary.innerHTML = '<span style="color:var(--correct)">✅ まちがいはありません！すばらしい！</span>';
    pb.disabled = true;
    pb.textContent = '📝 まちがいなし';
  }
}

function loadRecordsForProgress() {
  try { return JSON.parse(localStorage.getItem('jgeo_records_v2')) || {}; }
  catch { return {}; }
}

// =====================================================
// Web Audio サウンド
// =====================================================
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playSound(type) {
  try {
    const ctx = getAudio();
    if (type === 'correct') {
      // ピンポン♪ (2音上昇)
      [[660,.08,.12],[880,.12,.12]].forEach(([f,s,d],i) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sine'; o.frequency.value = f;
        const t = ctx.currentTime + i*0.12 + s;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.28, t + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t + d);
        o.start(t); o.stop(t + d + 0.05);
      });
    } else if (type === 'wrong') {
      // ブッ♪ (低音)
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sawtooth'; o.frequency.value = 180;
      o.frequency.linearRampToValueAtTime(120, ctx.currentTime + 0.18);
      g.gain.setValueAtTime(0.22, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);
      o.start(); o.stop(ctx.currentTime + 0.25);
    } else if (type === 'perfect') {
      // ファンファーレ風 (4音)
      [[523,.05,.18],[659,.18,.18],[784,.32,.18],[1047,.46,.3]].forEach(([f,s,d]) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'triangle'; o.frequency.value = f;
        const t = ctx.currentTime + s;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.25, t + 0.03);
        g.gain.exponentialRampToValueAtTime(0.001, t + d);
        o.start(t); o.stop(t + d + 0.05);
      });
    } else if (type === 'timeout') {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'square'; o.frequency.value = 300;
      o.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.3);
      g.gain.setValueAtTime(0.15, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.32);
      o.start(); o.stop(ctx.currentTime + 0.35);
    }
  } catch(e) {}
}

// =====================================================
// パーティクル（正解時の紙吹雪）
// =====================================================
const canvas = document.getElementById('particle-canvas');
const pctx   = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function spawnParticles() {
  const colors = ['#FFB703','#E63946','#2D9B4E','#457B9D','#A8DADC','#FF6B6B','#FFF'];
  for (let i = 0; i < 48; i++) {
    particles.push({
      x:  Math.random() * canvas.width,
      y:  -10,
      vx: (Math.random() - 0.5) * 4,
      vy: Math.random() * 4 + 2,
      r:  Math.random() * 7 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot:  Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.2,
      life: 1,
    });
  }
  requestAnimationFrame(animateParticles);
}

function animateParticles() {
  pctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.life > 0.01);
  particles.forEach(p => {
    p.x  += p.vx; p.y += p.vy; p.vy += 0.12;
    p.rot += p.rotV; p.life -= 0.018;
    pctx.save();
    pctx.globalAlpha = p.life;
    pctx.translate(p.x, p.y);
    pctx.rotate(p.rot);
    pctx.fillStyle = p.color;
    pctx.fillRect(-p.r/2, -p.r/2, p.r, p.r * 1.6);
    pctx.restore();
  });
  if (particles.length) requestAnimationFrame(animateParticles);
}
